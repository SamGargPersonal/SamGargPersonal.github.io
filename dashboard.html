<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | OmniTax Professionals</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/jpeg" href="assets/icons/omnitaxicon.jpg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header role="banner">
        <nav class="navbar" aria-label="Main navigation">
            <div class="navbar__inner">
                <a href="index.html" class="navbar__brand" aria-label="OmniTax Professionals home">
                    <img src="assets/icons/omnitaxicon.jpg" alt="OmniTax Professionals logo" class="navbar__logo">
                    <span class="navbar__name">OmniTax Professionals</span>
                </a>
                <ul class="navbar__nav" role="list">
                    <li><a href="index.html" class="navbar__link">Home</a></li>
                    <li><a href="services.html" class="navbar__link">Services</a></li>
                    <li class="navbar__dropdown-wrap">
                        <button class="navbar__dropdown-btn" aria-expanded="false" aria-haspopup="true">
                            Our Firm <span class="navbar__caret" aria-hidden="true">▾</span>
                        </button>
                        <ul class="navbar__dropdown-menu" role="list">
                            <li><a href="our-people.html" class="navbar__dropdown-item">Our People</a></li>
                            <li><a href="our-values.html" class="navbar__dropdown-item">Our Values</a></li>
                        </ul>
                    </li>
                    <li><a href="insights.html" class="navbar__link">Insights</a></li>
                    <li><a href="careers.html" class="navbar__link">Careers</a></li>
                    <li><a href="contact.html" class="navbar__link">Contact</a></li>
                    <li><a href="dashboard.html" class="navbar__cta" aria-label="Access client portal">Client Portal</a></li>
                </ul>
                <button class="navbar__hamburger" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="mobileNav">
                    <span></span><span></span><span></span>
                </button>
            </div>
            <ul class="navbar__mobile" id="mobileNav" role="list" aria-label="Mobile navigation">
                <li><a href="index.html" class="navbar__link">Home</a></li>
                <li><a href="services.html" class="navbar__link">Services</a></li>
                <li class="navbar__mobile-group">
                    <button class="navbar__mobile-group-btn" aria-expanded="false">
                        Our Firm <span class="navbar__caret" aria-hidden="true">▾</span>
                    </button>
                    <ul class="navbar__mobile-submenu" role="list">
                        <li><a href="our-people.html" class="navbar__link">Our People</a></li>
                        <li><a href="our-values.html" class="navbar__link">Our Values</a></li>
                    </ul>
                </li>
                <li><a href="insights.html" class="navbar__link">Insights</a></li>
                <li><a href="careers.html" class="navbar__link">Careers</a></li>
                <li><a href="contact.html" class="navbar__link">Contact</a></li>
                <li><a href="dashboard.html" class="navbar__cta">Client Portal</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <section class="section" aria-label="Dashboard content">
            <div class="container">
                <p style="text-align: center; color: var(--mid-grey); padding: 60px 0;">
                    Client dashboard coming soon.
                </p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
    <script>
        const navToggle = document.getElementById('navToggle');
        const mobileNav = document.getElementById('mobileNav');
        navToggle.addEventListener('click', function () {
            const isOpen = mobileNav.classList.toggle('open');
            navToggle.classList.toggle('open', isOpen);
            navToggle.setAttribute('aria-expanded', String(isOpen));
        });
        mobileNav.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => {
                mobileNav.classList.remove('open');
                navToggle.classList.remove('open');
                navToggle.setAttribute('aria-expanded', 'false');
            });
        });
        document.querySelectorAll('.navbar__dropdown-wrap').forEach(wrap => {
            const btn = wrap.querySelector('.navbar__dropdown-btn');
            btn.addEventListener('click', function () {
                const isOpen = wrap.classList.toggle('open');
                btn.setAttribute('aria-expanded', String(isOpen));
            });
        });
        document.addEventListener('click', function (e) {
            if (!e.target.closest('.navbar__dropdown-wrap')) {
                document.querySelectorAll('.navbar__dropdown-wrap.open').forEach(wrap => {
                    wrap.classList.remove('open');
                    wrap.querySelector('.navbar__dropdown-btn').setAttribute('aria-expanded', 'false');
                });
            }
        });
        document.querySelectorAll('.navbar__mobile-group-btn').forEach(btn => {
            btn.addEventListener('click', function () {
                const submenu = btn.nextElementSibling;
                const isOpen = submenu.classList.toggle('open');
                btn.setAttribute('aria-expanded', String(isOpen));
            });
        });
    </script>

</body>
</html>
